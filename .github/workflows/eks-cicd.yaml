name: EKS CI/CD

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  TF_ROOT: terraform
  APP_ROOT: app
  HELM_VALUES_FILE: helm/mission-status-api/values.yaml
  IMAGE_REPO: mission-status-api

permissions:
  id-token: write
  contents: write

jobs:
  quality-security:
    name: Code Quality, Tests, and Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r $APP_ROOT/requirements.txt
          pip install black flake8 pytest bandit

      - name: Black format check
        run: black --check app/main.py app/tests

      - name: Flake8 lint
        run: flake8 app/main.py app/tests --max-line-length=100

      - name: Pytest
        env:
          PYTHONPATH: ${{ env.APP_ROOT }}
        run: pytest $APP_ROOT/tests -v

      - name: Bandit SAST
        run: bandit -r $APP_ROOT -x $APP_ROOT/tests

  terraform-helm:
    name: Terraform and Helm Validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6

      - name: Terraform fmt
        run: terraform -chdir=$TF_ROOT fmt -check -recursive

      - name: Terraform init (backend disabled)
        run: terraform -chdir=$TF_ROOT init -backend=false

      - name: Terraform validate
        run: terraform -chdir=$TF_ROOT validate

      - name: Checkov scan
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: ${{ env.TF_ROOT }}
          quiet: true
          framework: terraform
          download_external_modules: true
          skip_check: CKV_TF_1,CKV2_AWS_62,CKV_AWS_144,CKV_AWS_18,CKV_AWS_356,CKV_AWS_111,CKV2_AWS_5,CKV2_AWS_12,CKV2_AWS_19,CKV_AWS_39,CKV_AWS_58

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.16.1

      - name: Helm lint
        run: helm lint helm/mission-status-api

  build-scan-push:
    name: Build, Scan, and Push Image
    runs-on: ubuntu-latest
    needs:
      - quality-security
      - terraform-helm
    if: github.event_name != 'pull_request'
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      ecr_uri: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_REPO }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.AWS_REGION }}
          role-to-assume: ${{ secrets.AWS_ROLE_TO_ASSUME }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Ensure ECR repository exists
        run: |
          aws ecr describe-repositories --repository-names "$IMAGE_REPO" >/dev/null 2>&1 || \
          aws ecr create-repository --repository-name "$IMAGE_REPO" --image-scanning-configuration scanOnPush=true

      - name: Set image metadata
        id: meta
        run: echo "image_tag=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build -t $IMAGE_REPO:${{ steps.meta.outputs.image_tag }} $APP_ROOT
          docker tag $IMAGE_REPO:${{ steps.meta.outputs.image_tag }} ${{ steps.login-ecr.outputs.registry }}/$IMAGE_REPO:${{ steps.meta.outputs.image_tag }}

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ steps.login-ecr.outputs.registry }}/${{ env.IMAGE_REPO }}:${{ steps.meta.outputs.image_tag }}
          format: table
          exit-code: '1'
          severity: HIGH,CRITICAL
          vuln-type: 'os,library'
          ignore-unfixed: true

      - name: Push image to ECR
        run: docker push ${{ steps.login-ecr.outputs.registry }}/$IMAGE_REPO:${{ steps.meta.outputs.image_tag }}

  update-helm-values:
    name: Update Helm Values for GitOps
    runs-on: ubuntu-latest
    needs: build-scan-push
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT || github.token }}

      - name: Install yq
        run: |
          sudo wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/download/v4.44.3/yq_linux_amd64
          sudo chmod +x /usr/local/bin/yq

      - name: Update Helm values
        run: |
          yq -i '.image.repository = "${{ needs.build-scan-push.outputs.ecr_uri }}"' $HELM_VALUES_FILE
          yq -i '.image.tag = "${{ needs.build-scan-push.outputs.image_tag }}"' $HELM_VALUES_FILE
          yq -i '.env.APP_VERSION = "${{ needs.build-scan-push.outputs.image_tag }}"' $HELM_VALUES_FILE

      - name: Commit and push updated values
        run: |
          git config user.email "github-actions@example.com"
          git config user.name "github-actions"
          git add $HELM_VALUES_FILE
          git commit -m "Update Helm image tag to ${{ needs.build-scan-push.outputs.image_tag }}" || echo "No changes to commit"
          git push

