name: GCP GKE CI/CD

on:
  push:
    branches: [ "main" ]
    paths:
      - "app/**"
      - "helm/**"
      - "gcp/**"
      - ".github/workflows/gcp-*.yaml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

env:
  APP_NAME: mission-status-api
  APP_NAMESPACE: mission-status
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_REGION: ${{ vars.GCP_REGION }}
  GCP_ZONE: ${{ vars.GCP_ZONE }}
  GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
  GCP_ARTIFACT_REPO: ${{ vars.GCP_ARTIFACT_REPO }}
  IMAGE_TAG: ${{ github.sha }}
  IMAGE_REPO: ${{ vars.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ vars.GCP_ARTIFACT_REPO }}/mission-status-api

jobs:
  validate:
    name: Validate Terraform and Helm
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt check
        run: terraform -chdir=gcp/terraform fmt -check -recursive

      - name: Terraform init
        run: terraform -chdir=gcp/terraform init -backend=false

      - name: Terraform validate
        run: terraform -chdir=gcp/terraform validate

      - name: Helm lint
        run: helm lint helm/mission-status-api

  build-scan-push:
    name: Build, Scan, and Push Image
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker auth for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build image
        run: docker build -t $IMAGE_REPO:$IMAGE_TAG ./app

      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_REPO }}:${{ env.IMAGE_TAG }}
          format: table
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
          ignore-unfixed: true

      - name: Push image
        run: docker push $IMAGE_REPO:$IMAGE_TAG

  deploy:
    name: Deploy to GKE
    runs-on: ubuntu-latest
    needs: build-scan-push

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}
          project_id: ${{ vars.GCP_PROJECT_ID }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v3
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GCP_ZONE }}

      - name: Deploy app with Helm
        run: |
          helm upgrade --install $APP_NAME ./helm/mission-status-api \
            --namespace $APP_NAMESPACE \
            --create-namespace \
            -f helm/mission-status-api/values-gcp.yaml \
            --set image.repository=$IMAGE_REPO \
            --set image.tag=$IMAGE_TAG

      - name: Apply managed certificate
        run: kubectl apply -f gcp/k8s/managed-cert.yaml

      - name: Apply ingress
        run: kubectl apply -f gcp/k8s/ingress-gke.yaml

      - name: Show deployment status
        run: |
          kubectl get pods -n $APP_NAMESPACE
          kubectl get svc -n $APP_NAMESPACE
          kubectl get ingress -n $APP_NAMESPACE
