replicaCount: 1

image:
  repository: us-east1-docker.pkg.dev/mission-status-api/mission-status/mission-status-api
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    cpu: 25m
    memory: 32Mi
  limits:
    cpu: 100m
    memory: 128Mi

env:
  ENV: gcp
  APP_VERSION: "latest"

ingress:
  enabled: false

serviceAccount:
  create: true
  name: ""
