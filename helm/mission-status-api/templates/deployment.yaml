apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mission-status-api.fullname" . }}
  labels:
    app.kubernetes.io/name: {{ include "mission-status-api.name" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "mission-status-api.name" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "mission-status-api.name" . }}
    spec:
      serviceAccountName: {{ if .Values.serviceAccount.name }}{{ .Values.serviceAccount.name }}{{ else }}{{ include "mission-status-api.fullname" . }}{{ end }}
      containers:
        - name: mission-status-api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          env:
            - name: ENV
              value: {{ .Values.env.ENV | quote }}
            - name: APP_VERSION
              value: {{ .Values.env.APP_VERSION | quote }}
            - name: CLOUD_PROVIDER
              value: "{{ .Values.env.CLOUD_PROVIDER }}"
            - name: CLOUD_REGION
              value: "{{ .Values.env.CLOUD_REGION }}"
            - name: CLUSTER_NAME
              value: "{{ .Values.env.CLUSTER_NAME }}"
            - name: DEPLOYED_AT
              value: "{{ .Values.env.DEPLOYED_AT }}"
          resources:
{{ toYaml .Values.resources | indent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.service.targetPort }}
            initialDelaySeconds: 5
            periodSeconds: 10

